{% extends "base.html" %}
{% block content %}
<hr class="my-3">

<div class="text-center bg-warning p-3 mx-1">
    <h4>猜一猜：這是什麼表情 ?</h4>
    {% if image %}
        <img src="{{ url_for('static', filename=image.image_path) }}"
             alt="{{ stage }}" class="img-fluid" style="max-height:350px;">
    {% else %}
        <p>找不到圖片</p>
    {% endif %}
</div>

<!-- ✅ 大按鈕：測驗開始 -->
<div class="text-center mt-4">
    <button id="startBtn" class="btn btn-danger btn-lg px-5 py-3">
        🚀 測驗開始
    </button>
</div>

<!-- ✅ 音檔 -->
{% if image and image.audio_path %}
<audio id="audioPlayer" src="{{ url_for('static', filename=image.audio_path) }}"></audio>
{% endif %}

<!-- ✅ 選項區塊，預設隱藏 -->
<div id="choices" class="row justify-content-center mt-4" style="display:none;">
    {% for choice in ["喜", "怒", "哀", "樂"] %}
    <div class="col-md-3 text-center mb-3">
        {% if image %}
            <form method="post" action="{{ url_for('finish_stage', stage=stage) }}">
                <input type="hidden" name="image_id" value="{{ image.id }}">
                <input type="hidden" name="child_choice" value="{{ choice }}">
                <button type="submit" class="btn btn-lg btn-success w-100">
                    {{ choice }}
                </button>
            </form>
        {% else %}
            <p class="text-danger">⚠ 尚未設定圖片，請通知管理者後台新增圖片。</p>
        {% endif %}
    </div>
    {% endfor %}
</div>

<a href="{{ url_for('game_home') }}" class="btn btn-outline-success mt-1 mb-4">返回首頁</a>

<!-- ✅ JavaScript 控制流程 -->
<script>
document.getElementById("startBtn")?.addEventListener("click", function() {
    // 播放音檔（如果有）
    const audio = document.getElementById("audioPlayer");
    if (audio) {
        audio.play();
    }
    // 顯示選項
    document.getElementById("choices").style.display = "flex";
    // 隱藏開始按鈕
    this.style.display = "none";
});
</script>
{% endblock %}
