{% extends "base.html" %}
{% block content %}
<div class="container-fluid mt-4">
  <h2 class="text-center mb-4">模型比較測試：{{ stage }}</h2>

  <div class="row">
    <!-- 左邊：舊模型 (FER) -->
    <div class="col-md-6 border-end">
      <h4 class="text-center text-primary">舊模型 (FER)</h4>
      <video id="camera" autoplay playsinline class="w-100 h-50"></video>
      <canvas id="snapshot" style="display:none;"></canvas>
      <div id="result_fer" class="text-center mt-3 bg-white p-2 border rounded"></div>
    </div>

    <!-- 右邊：新模型 (DeepFace) -->
    <div class="col-md-6">
      <h4 class="text-center text-success">新模型 (DeepFace)</h4>
      <div id="result_deepface" class="text-center mt-3 bg-white p-2 border rounded"></div>
    </div>
  </div>

  <!-- 控制按鈕 -->
  <div class="row mt-4">
    <div class="col text-center">
      <button id="startBtn" class="btn btn-success">開始辨識</button>
      <button id="stopBtn" class="btn btn-danger" disabled>停止辨識</button>
      <button id="clearBtn" class="btn btn-secondary">清除紀錄</button>
    </div>
  </div>

  <!-- 比較表 -->
  <div class="row mt-4">
    <div class="col-12">
      <h4 class="text-center">表現比較表</h4>
      <table class="table table-bordered text-center">
        <thead>
          <tr>
            <th>檢查次數</th>
            <th>舊模型 (FER)</th>
            <th>新模型 (DeepFace)</th>
            <th>是否一致</th>
          </tr>
        </thead>
        <tbody id="comparison_table">
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    document.getElementById('camera').srcObject = stream;
  });

let checkCount = 0;
let timer = null;

function captureAndSend() {
    let video = document.getElementById('camera');
    let canvas = document.getElementById('snapshot');
    let ctx = canvas.getContext('2d');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    let data = canvas.toDataURL('image/png');

    // 舊模型 (FER)
    fetch("{{ url_for('check_expression', stage=stage) }}", {
        method: "POST",
        body: JSON.stringify({ image: data }),
        headers: { "Content-Type": "application/json" }
    })
    .then(res => res.json())
    .then(ferData => {
        document.getElementById('result_fer').innerHTML =
            "<p>結果：" + ferData.result + " (AI判斷：" + ferData.emotion + ")</p>" +
            "<img src='/static/captured_images/" + ferData.file + "' class='img-fluid mt-2'>";

        // 新模型 (DeepFace)
        fetch("{{ url_for('test_expression', stage=stage) }}", {
            method: "POST",
            body: JSON.stringify({ image: data }),
            headers: { "Content-Type": "application/json" }
        })
        .then(res => res.json())
        .then(dfData => {
            document.getElementById('result_deepface').innerHTML =
                "<p>AI判斷：" + dfData.emotion + " (信心分數：" + dfData.score.toFixed(2) + ")</p>" +
                "<img src='/static/test_images/" + dfData.file + "' class='img-fluid mt-2'>";

            // 更新比較表
            checkCount++;
            let isSame = (ferData.emotion === dfData.emotion) ? "✔️" : "❌";
            let row = "<tr><td>" + checkCount + "</td>" +
                      "<td>" + ferData.emotion + "</td>" +
                      "<td>" + dfData.emotion + "</td>" +
                      "<td>" + isSame + "</td></tr>";
            document.getElementById('comparison_table').innerHTML += row;
        });
    });
}

// 控制按鈕事件
document.getElementById('startBtn').addEventListener('click', () => {
    if (!timer) {
        timer = setInterval(captureAndSend, 5000);
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
    }
});

document.getElementById('stopBtn').addEventListener('click', () => {
    if (timer) {
        clearInterval(timer);
        timer = null;
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
    }
});

document.getElementById('clearBtn').addEventListener('click', () => {
    checkCount = 0;
    document.getElementById('comparison_table').innerHTML = "";
    document.getElementById('result_fer').innerHTML = "";
    document.getElementById('result_deepface').innerHTML = "";
});
</script>
{% endblock %}
