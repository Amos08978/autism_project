{% extends "base.html" %}
{% block content %}
<div class="row mt-4 bg-warning p-3" style="height:80vh;">
  <h2 class="text-center mt-2">學一學：{{ stage }}</h2>
  <div class="col-md-6 d-flex justify-content-center align-items-center">
    <img src="{{ url_for('static', filename=image.image_path) }}"
         alt="{{ stage }}" class="img-fluid h-100 w-100 object-fit-contain">
  </div>

  <div class="col-md-6 d-flex justify-content-center align-items-center position-relative">
    <video id="camera" autoplay playsinline class="w-100 h-100"></video>
    <!-- 疊加方框的 canvas -->
    <canvas id="overlay" class="position-absolute top-0 start-0 w-100 h-100"></canvas>
    <canvas id="snapshot" style="display:none;"></canvas>
  </div>
</div>

<div id="result" class="text-center mt-3"></div>
<div id="remaining" class="text-center mt-2 text-muted"></div>

<script>
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => {
    document.getElementById('camera').srcObject = stream;
  });

let intervalSeconds = {{ interval }};
let captureTimes = {{ times }};
let count = 0;

function updateRemaining() {
    let remaining = captureTimes - count;
    document.getElementById('remaining').innerHTML =
        "剩餘拍照次數：" + remaining;
}

function drawBox(region, emotion) {
    let video = document.getElementById('camera');
    let canvas = document.getElementById('overlay');
    let ctx = canvas.getContext('2d');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "lime";
    ctx.lineWidth = 3;
    ctx.strokeRect(region.x, region.y, region.w, region.h);

    ctx.font = "20px Arial";
    ctx.fillStyle = "lime";
    ctx.fillText(emotion, region.x, region.y - 10);
}

function captureAndSend() {
    let video = document.getElementById('camera');
    let canvas = document.getElementById('snapshot');
    let ctx = canvas.getContext('2d');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    let data = canvas.toDataURL('image/png');

    fetch("{{ url_for('check_expression', stage=stage) }}", {
        method: "POST",
        body: JSON.stringify({ image: data }),
        headers: { "Content-Type": "application/json" }
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('result').innerHTML +=
            "<p>第 " + (count+1) + " 次檢查結果：" + data.result +
            " (AI判斷：" + data.emotion + ")</p>";

        // 即時畫框
        if (data.region) {
            drawBox(data.region, data.emotion);
        }

        if (data.success) {
            clearInterval(timer);
            window.location.href = "{{ url_for('play_stage') }}";
        }
    });

    count++;
    updateRemaining();

    if (count >= captureTimes) {
        clearInterval(timer);
        window.location.href = "{{ url_for('play_stage') }}";
    }
}

// 初始化顯示剩餘次數
updateRemaining();

// 啟動定時拍照
let timer = setInterval(captureAndSend, intervalSeconds * 1000);
</script>
{% endblock %}
